<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>권은정 | 자기소개</title>
<style>
  :root {
    --bg: #0f1115;
    --card-bg: #ffffff;
    --accent: #4f46e5;
    --accent-light: #818cf8;
    --text: #1f2430;
    --muted: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f1115 0%, #232946 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    padding: 48px 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    text-align: center;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 36px;
    font-weight: 700;
  }

  h1 {
    font-size: 26px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .role {
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 20px;
  }

  .intro {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .contact {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    border-top: 1px solid #eee;
    padding-top: 24px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
  }

  .contact-item .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: #f1f2fe;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .contact-item span.value {
    color: var(--muted);
  }

  .contact-item:hover span.value {
    color: var(--accent);
  }

  footer {
    margin-top: 32px;
    font-size: 12px;
    color: #cbd0e0;
    text-align: center;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="avatar">권</div>
    <h1>권은정</h1>
    <p class="role">Frontend Developer</p>
    <p class="intro">
      안녕하세요, 사용자 중심의 인터페이스를 고민하는 개발자 권은정입니다.<br>
      새로운 기술을 배우고 적용하는 것을 즐기며, 함께 성장하는 팀을 지향합니다.
    </p>

    <div class="contact">
      <a class="contact-item" href="mailto:ejkwon0305@gmail.com">
        <span class="icon">✉️</span>
        <span class="value">ejkwon0305@gmail.com</span>
      </a>
      <a class="contact-item" href="tel:010-8886-2224">
        <span class="icon">📞</span>
        <span class="value">010-8886-2224</span>
      </a>
      <a class="contact-item" href="https://github.com/ejkwon0305-kate" target="_blank" rel="noopener">
        <span class="icon">🐙</span>
        <span class="value">github.com/ejkwon0305-kate</span>
      </a>
    </div>
  </main>

  <footer>&copy; 2026 Kwon Eunjeong. All rights reserved.</footer>
</body>
</html>
